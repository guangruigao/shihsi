<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>量化监控 - 多周期共振版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #ffffff; font-family: system-ui, -apple-system, sans-serif; }
        .card-bg { background-color: #0f172a; border: 1px solid #1e293b; transition: all 0.3s; }
        .resonance-glow { box-shadow: 0 0 20px rgba(52, 211, 153, 0.2); border-color: #10b981; }
        .time-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #1e293b; color: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ================= 核心算法 =================
        const calcEMA = (d, p) => { if (!d?.length) return 0; const k = 2/(p+1); let e = d[0]; for (let i=1; i<d.length; i++) e = d[i]*k + e*(1-k); return e; };
        const calcRSI = (d, p=14) => { if (!d || d.length < p+1) return 50; let g=0, l=0; for (let i=1; i<=p; i++) { const df=d[i]-d[i-1]; if(df>=0) g+=df; else l-=df; } return 100-100/(1+(g/(l||1))); };
        const calcATR = (c, p=14) => { const trs=[]; for(let i=1; i<c.length; i++) trs.push(Math.max(c[i].high-c[i].low, Math.abs(c[i].high-c[i-1].close), Math.abs(c[i].low-c[i-1].close))); return trs.slice(-p).reduce((a,b)=>a+b,0)/p; };
        const calcVWAP = (c) => { const pv = c.reduce((s, x)=>s+x.close*x.volume, 0), v = c.reduce((s,x)=>s+x.volume,0); return v ? pv/v : 0; };
        
        const scoreSystem = (candles, fearGreed=50, news=[]) => {
            const closes = candles.map(c => c.close);
            const last = closes.at(-1);
            const atr = calcATR(candles);
            const ema20 = calcEMA(closes.slice(-20), 20);
            const ema50 = calcEMA(closes.slice(-50), 50);
            const vwap = calcVWAP(candles);
            const rsi = calcRSI(closes.slice(-15));
            const prevHigh = Math.max(...candles.slice(-20).map(c => c.high));
            const prevLow = Math.min(...candles.slice(-20).map(c => c.low));

            // 基础分项
            const trend = (ema20 > ema50 ? 10 : 0) + (last > vwap ? 10 : 0);
            const structure = (last > prevHigh * 0.998 ? 10 : 0) + (last < prevLow * 1.002 ? 10 : 0);
            const momentum = (rsi > 50 ? 10 : 0);
            
            // 止损止盈预计算 (修复变量顺序)
            const isLongPotential = (trend + structure + momentum) > 15;
            const stopLoss = isLongPotential ? prevLow - atr * 0.5 : prevHigh + atr * 0.5;
            const riskDist = Math.abs(last - stopLoss);
            const tp2 = isLongPotential ? last + riskDist * 2 : last - riskDist * 2;
            const rr = riskDist ? Math.abs(tp2 - last) / riskDist : 0;

            let total = trend + structure + momentum + (fearGreed < 40 ? 10 : 0);
            let signal = total >= 35 ? "做多" : total <= 15 ? "做空" : "观望";
            
            return { total, signal, last, stopLoss, tp2, rr, atr, prevHigh, prevLow };
        };

        function App() {
            const [market, setMarket] = useState({ btc: null, eth: null });
            const [time, setTime] = useState(new Date());

            const fetchCoin = async (instId) => {
                const getK = async (bar) => {
                    const res = await fetch(`https://www.okx.com/api/v5/market/candles?instId=${instId}&bar=${bar}&limit=100`);
                    const j = await res.json();
                    return j.data.reverse().map(i => ({ high:+i[2], low:+i[3], close:+i[4], volume:+i[5] }));
                };

                const [c5, c15, c1h] = await Promise.all([getK("5m"), getK("15m"), getK("1H")]);
                const s5 = scoreSystem(c5, 32);
                const s15 = scoreSystem(c15, 32);
                const s1h = scoreSystem(c1h, 32);

                // --- 多周期权重修正 ---
                let finalScore = s5.total;
                if (s1h.signal === "做多") finalScore += 15;
                if (s1h.signal === "做空") finalScore -= 15;
                if (s15.signal === "做多") finalScore += 8;

                let finalSignal = finalScore >= 50 ? "强力做多" : finalScore >= 35 ? "偏多" : finalScore <= 15 ? "做空" : "观望";
                if (s5.rr < 1.5 && finalSignal.includes("多")) finalSignal = "观望(低盈亏比)";

                return { 
                    price: s5.last, 
                    score: { ...s5, total: finalScore, signal: finalSignal, s15, s1h } 
                };
            };

            const load = async () => {
                const [b, e] = await Promise.all([fetchCoin("BTC-USDT-SWAP"), fetchCoin("ETH-USDT-SWAP")]);
                setMarket({ btc: b, eth: e });
            };

            useEffect(() => { load(); const t=setInterval(load, 10000); return ()=>clearInterval(t); }, []);

            const Card = ({ name, data }) => {
                if (!data) return null;
                const { score: s, price } = data;
                const isResonance = s.signal.includes("做多") && s.s1h.signal === "做多";

                return (
                    <div className={`card-bg rounded-3xl p-5 mb-4 ${isResonance ? 'resonance-glow' : ''}`}>
                        <div className="flex justify-between items-start mb-4">
                            <div>
                                <h2 className="text-slate-400 font-bold uppercase text-xs tracking-widest">{name}</h2>
                                <div className="text-3xl font-black mt-1 text-emerald-400">{s.total} <span className="text-sm opacity-60">SCORE</span></div>
                            </div>
                            <div className="text-right">
                                <div className="text-2xl font-mono font-bold">${price.toLocaleString()}</div>
                                {isResonance && <span className="bg-emerald-500 text-black text-[10px] px-2 py-0.5 rounded-full font-black animate-pulse">趋势共振</span>}
                            </div>
                        </div>

                        {/* 多周期快报 */}
                        <div className="flex gap-2 mb-4">
                            <div className="flex-1 bg-slate-900/50 p-2 rounded-xl border border-slate-800 text-center">
                                <div className="time-tag mb-1">15M</div>
                                <div className={`text-xs font-bold ${s.s15.signal === '做多' ? 'text-emerald-400' : 'text-slate-500'}`}>{s.s15.signal}</div>
                            </div>
                            <div className="flex-1 bg-slate-900/50 p-2 rounded-xl border border-slate-800 text-center">
                                <div className="time-tag mb-1">1H</div>
                                <div className={`text-xs font-bold ${s.s1h.signal === '做多' ? 'text-emerald-400' : 'text-slate-500'}`}>{s.s1h.signal}</div>
                            </div>
                        </div>

                        {/* 关键位 */}
                        <div className="bg-slate-950/50 rounded-2xl p-4 space-y-2 border border-slate-800/50">
                            <div className="flex justify-between text-sm">
                                <span className="text-red-400 font-bold">止损 SL</span>
                                <span className="font-mono">{s.stopLoss.toFixed(1)}</span>
                            </div>
                            <div className="flex justify-between text-sm text-emerald-400 font-bold">
                                <span>止盈 TP2</span>
                                <span className="font-mono">{s.tp2.toFixed(1)}</span>
                            </div>
                            <div className="flex justify-between text-[10px] text-slate-500 pt-1 border-t border-slate-800">
                                <span>盈亏比</span>
                                <span>1 : {s.rr.toFixed(2)}</span>
                            </div>
                        </div>
                        
                        <div className="mt-4 text-center">
                            <div className={`py-2 rounded-xl font-black text-lg ${s.signal.includes('做多') ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-slate-400'}`}>
                                {s.signal}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto p-4">
                    <div className="text-center mb-6">
                        <div className="text-[10px] text-slate-600 uppercase tracking-[0.4em]">MTF Resonance System</div>
                        <div className="text-xs font-mono text-slate-400 mt-1">{time.toLocaleTimeString()}</div>
                    </div>
                    <Card name="BTC-USDT" data={market.btc} />
                    <Card name="ETH-USDT" data={market.eth} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
