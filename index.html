<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OKX 日内信号系统 Pro</title>
<style>
body{margin:0;background:#0d1117;color:#fff;font-family:-apple-system;padding:12px}
.wrap{max-width:520px;margin:auto}
.card{background:#161b22;border-radius:14px;padding:14px;margin-bottom:12px}
.row{display:flex;justify-content:space-between;margin:8px 0}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tab{padding:10px;background:#1f2937;border-radius:10px;text-align:center;cursor:pointer}
.active{border:1px solid #fff}
input,select,button{width:100%;padding:10px;border-radius:10px;border:none;margin-top:8px}
button{background:#238636;color:#fff}
.big{font-size:28px;font-weight:700}
.good{color:#4ade80}
.warn{color:#facc15}
.bad{color:#f87171}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
<div class="tabs" id="tabs"></div>
</div>

<div class="card">
<div id="coinTitle">BTC-USDT-SWAP</div>
<div class="big" id="price">--</div>
<div class="row"><span>趋势</span><span id="trend">--</span></div>
<div class="row"><span>评分</span><span id="score">--</span></div>
<div class="row"><span>信号</span><span id="signal">等待</span></div>
</div>

<div class="card">
<div class="row"><span>支撑</span><span id="support">--</span></div>
<div class="row"><span>压力</span><span id="resistance">--</span></div>
<div class="row"><span>建议进场</span><span id="entry">--</span></div>
<div class="row"><span>止损</span><span id="sl">--</span></div>
<div class="row"><span>TP1</span><span id="tp1">--</span></div>
<div class="row"><span>TP2</span><span id="tp2">--</span></div>
</div>

<div class="card">
<div class="row"><span>本金</span><span><input id="capital" value="1000"></span></div>
<div class="row"><span>杠杆</span><span><input id="lev" value="5"></span></div>
<button onclick="runBacktest()">历史回测</button>
<div id="backtestResult"></div>
</div>

</div>

<script>
const coins=[
"BTC-USDT-SWAP",
"ETH-USDT-SWAP",
"SOL-USDT-SWAP",
"XRP-USDT-SWAP",
"DOGE-USDT-SWAP",
"BNB-USDT-SWAP"
];

let current=coins[0];
let ws=null;
let lastPrice=0;

function renderTabs(){
 let html='';
 coins.forEach(c=>{
   html+=`<div class="tab ${c===current?'active':''}" onclick="switchCoin('${c}')">${c.split('-')[0]}</div>`;
 });
 document.getElementById('tabs').innerHTML=html;
}

function switchCoin(c){
 current=c;
 document.getElementById('coinTitle').innerText=c;
 renderTabs();
 connectWS();
 loadMultiTF();
}

function connectWS(){
 if(ws) ws.close();
 ws=new WebSocket("wss://ws.okx.com:8443/ws/v5/public");
 ws.onopen=()=>{
   ws.send(JSON.stringify({
     op:"subscribe",
     args:[{channel:"tickers",instId:current}]
   }));
 };
 ws.onmessage=(e)=>{
   const msg=JSON.parse(e.data);
   if(msg.data&&msg.data[0]){
     lastPrice=parseFloat(msg.data[0].last);
     document.getElementById('price').innerText=lastPrice.toFixed(2);
     generateSignal();
   }
 };
}

async function fetchKline(bar,limit=30){
 const url=`https://www.okx.com/api/v5/market/candles?instId=${current}&bar=${bar}&limit=${limit}`;
 const res=await fetch(url);
 const json=await res.json();
 return json.data.map(x=>({
   close:parseFloat(x[4]),
   volume:parseFloat(x[5]),
   high:parseFloat(x[2]),
   low:parseFloat(x[3])
 })).reverse();
}

function ema(arr,period){
 const k=2/(period+1);
 let val=arr[0];
 for(let i=1;i<arr.length;i++){
   val=arr[i]*k+val*(1-k);
 }
 return val;
}

async function loadMultiTF(){
 const h1=await fetchKline("1H");
 const m15=await fetchKline("15m");
 const m5=await fetchKline("5m");

 window.h1=h1;
 window.m15=m15;
 window.m5=m5;

 generateSignal();
}

function volumeDecline(data){
 const len=data.length;
 return data[len-1].volume < data[len-2].volume &&
        data[len-2].volume < data[len-3].volume;
}

function generateSignal(){
 if(!window.h1||!window.m15||!window.m5||!lastPrice) return;

 const h1close=h1.map(x=>x.close);
 const ema20=ema(h1close.slice(-20),20);
 const ema60=ema(h1close.slice(-30),30);

 const bullish=ema20>ema60;
 const trend=bullish?"多头":"空头";

 const lows=m15.slice(-10).map(x=>x.low);
 const highs=m15.slice(-10).map(x=>x.high);

 const support=Math.min(...lows);
 const resistance=Math.max(...highs);

 const volOk=volumeDecline(m5.slice(-5));

 let score=0;
 if(bullish) score+=35;
 if(Math.abs(lastPrice-support)/lastPrice<0.003) score+=30;
 if(volOk) score+=20;
 if(lastPrice>support) score+=15;

 const signal=score>=80?"强信号":score>=65?"观察":"等待";

 const sl=(support*0.998).toFixed(2);
 const tp1=resistance.toFixed(2);
 const tp2=(resistance+(resistance-support)*0.8).toFixed(2);

 document.getElementById('trend').innerHTML=trend;
 document.getElementById('score').innerHTML=score;
 document.getElementById('signal').innerHTML=signal;
 document.getElementById('support').innerHTML=support.toFixed(2);
 document.getElementById('resistance').innerHTML=resistance.toFixed(2);
 document.getElementById('entry').innerHTML=`${support.toFixed(2)} - ${lastPrice.toFixed(2)}`;
 document.getElementById('sl').innerHTML=sl;
 document.getElementById('tp1').innerHTML=tp1;
 document.getElementById('tp2').innerHTML=tp2;
}

async function runBacktest(){
 const data=await fetchKline("5m",100);
 let win=0,total=0,pnl=0;

 for(let i=20;i<data.length-5;i++){
   const support=Math.min(...data.slice(i-10,i).map(x=>x.low));
   const entry=data[i].close;
   const next=data[i+3].close;
   total++;
   if(next>entry){win++; pnl+=1}
   else pnl-=1;
 }

 const rate=((win/total)*100).toFixed(1);

 document.getElementById('backtestResult').innerHTML=
   `<div style="margin-top:10px">
    胜率: ${rate}%<br>
    总交易: ${total}<br>
    模拟收益: ${pnl}R
   </div>`;
}

renderTabs();
connectWS();
loadMultiTF();
setInterval(loadMultiTF,30000);
</script>
</body>
</html>
