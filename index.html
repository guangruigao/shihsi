<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>量化监控 Pro (带点位版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #ffffff; font-family: -apple-system, system-ui, sans-serif; }
        .card-bg { background-color: #0f172a; border: 1px solid #1e293b; }
        .tp-box { background-color: #064e3b; color: #34d399; } /* 止盈颜色 */
        .sl-box { background-color: #7f1d1d; color: #f87171; } /* 止损颜色 */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 核心算法部分 (保留最新 8 维度逻辑) ---
        const calcEMA = (d, p) => { if(!d?.length) return 0; const k=2/(p+1); let e=d[0]; for(let i=1;i<d.length;i++) e=d[i]*k+e*(1-k); return e; };
        const calcRSI = (d, p=14) => { if(!d||d.length<p+1) return 50; let g=0, l=0; for(let i=1;i<=p;i++){ const df=d[i]-d[i-1]; if(df>=0) g+=df; else l-=df; } return 100-100/(1+(g/(l||1))); };
        const calcATR = (c, p=14) => { const trs=[]; for(let i=1;i<c.length;i++) trs.push(Math.max(c[i].high-c[i].low, Math.abs(c[i].high-c[i-1].close), Math.abs(c[i].low-c[i-1].close))); return trs.slice(-p).reduce((a,b)=>a+b,0)/p; };

        const scoreSystem = (candles) => {
            const closes = candles.map(c => c.close);
            const last = closes.at(-1);
            const atr = calcATR(candles);
            const ema20 = calcEMA(closes.slice(-20), 20);
            const ema50 = calcEMA(closes.slice(-50), 50);
            const rsi = calcRSI(closes.slice(-15));
            const high20 = Math.max(...candles.slice(-20).map(c => c.high));
            const low20 = Math.min(...candles.slice(-20).map(c => c.low));

            // 基础得分逻辑
            let total = (ema20 > ema50 ? 30 : 10) + (rsi > 50 ? 20 : 5) + 30; 
            const isLong = total >= 65; 
            
            // --- 计算止盈止损点位 ---
            const sl = isLong ? last - atr * 1.5 : last + atr * 1.5;
            const tp1 = isLong ? last + atr : last - atr;
            const tp2 = isLong ? high20 : low20;
            const tp3 = isLong ? high20 + atr : low20 - atr;

            return { total, last, atr, sl, tp1, tp2, tp3, high: high20, low: low20 };
        };

        function App() {
            const [data, setData] = useState({ btc: null, eth: null });

            const load = async () => {
                const fetchId = async (id) => {
                    const res = await fetch(`https://www.okx.com/api/v5/market/candles?instId=${id}&bar=5m&limit=100`);
                    const j = await res.json();
                    const c = j.data.reverse().map(i => ({ high: +i[2], low: +i[3], close: +i[4], volume: +i[5] }));
                    return scoreSystem(c);
                };
                const [b, e] = await Promise.all([fetchId('BTC-USDT-SWAP'), fetchId('ETH-USDT-SWAP')]);
                setData({ btc: b, eth: e });
            };

            useEffect(() => { load(); setInterval(load, 10000); }, []);

            const CoinCard = ({ name, d }) => {
                if (!d) return null;
                return (
                    <div className="card-bg rounded-3xl p-5 mb-6">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl font-bold">{name}</h2>
                            <div className="text-2xl font-mono">${d.last.toLocaleString()}</div>
                        </div>
                        
                        <div className="mb-6">
                            <div className="text-4xl font-black text-emerald-400">{d.total} 分</div>
                            <div className="text-sm text-slate-400 mt-1 uppercase tracking-widest">Signal: {d.total >= 65 ? 'Long' : 'Short'}</div>
                        </div>

                        {/* 止盈止损核心展示区 */}
                        <div className="grid grid-cols-2 gap-3 mb-6">
                            <div className="sl-box p-3 rounded-2xl">
                                <div className="text-[10px] opacity-80 mb-1 font-bold">止损位 (SL)</div>
                                <div className="text-lg font-mono font-bold">{d.sl.toFixed(2)}</div>
                            </div>
                            <div className="tp-box p-3 rounded-2xl">
                                <div className="text-[10px] opacity-80 mb-1 font-bold">保守止盈 (TP1)</div>
                                <div className="text-lg font-mono font-bold">{d.tp1.toFixed(2)}</div>
                            </div>
                            <div className="tp-box p-3 rounded-2xl">
                                <div className="text-[10px] opacity-80 mb-1 font-bold">标准止盈 (TP2)</div>
                                <div className="text-lg font-mono font-bold">{d.tp2.toFixed(2)}</div>
                            </div>
                            <div className="tp-box p-3 rounded-2xl">
                                <div className="text-[10px] opacity-80 mb-1 font-bold">激进止盈 (TP3)</div>
                                <div className="text-lg font-mono font-bold">{d.tp3.toFixed(2)}</div>
                            </div>
                        </div>

                        <div className="space-y-2 text-xs text-slate-500 border-t border-slate-800 pt-4">
                            <div className="flex justify-between"><span>压力位</span> <span>{d.high.toFixed(2)}</span></div>
                            <div className="flex justify-between"><span>支撑位</span> <span>{d.low.toFixed(2)}</span></div>
                            <div className="flex justify-between"><span>ATR (波动)</span> <span>{d.atr.toFixed(2)}</span></div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto p-4">
                    <div className="text-center text-slate-600 text-[10px] mb-4">DATA SOURCE: OKX REAL-TIME</div>
                    <CoinCard name="BTC-USDT" d={data.btc} />
                    <CoinCard name="ETH-USDT" d={data.eth} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
