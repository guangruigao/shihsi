<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OKX Signal Pro V4</title>
<style>
body{
    margin:0;
    background:#0d1117;
    color:#fff;
    font-family:-apple-system;
    padding:12px;
}
.wrap{
    max-width:520px;
    margin:auto;
}
.card{
    background:#161b22;
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
}
.tabs{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}
.tab{
    padding:10px;
    background:#1f2937;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
}
.active{
    border:1px solid #fff;
}
.row{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}
.big{
    font-size:28px;
    font-weight:700;
}
button,input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
}
button{
    background:#238636;
    color:#fff;
}
input{
    background:#1f2937;
    color:#fff;
}
.signal-item{
    border-top:1px solid #30363d;
    padding:8px 0;
    font-size:13px;
}
.win{color:#4ade80}
.loss{color:#f87171}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
    <div class="tabs" id="tabs"></div>
</div>

<div class="card">
    <div id="coinTitle">BTC-USDT-SWAP</div>
    <div class="big" id="price">加载中...</div>
    <div class="row"><span>趋势</span><span id="trend">--</span></div>
    <div class="row"><span>评分</span><span id="score">0</span></div>
    <div class="row"><span>信号</span><span id="signal">等待</span></div>
</div>

<div class="card">
    <input id="capital" value="1000" placeholder="本金">
    <input id="lev" value="5" placeholder="杠杆">
    <button onclick="runBacktest()">开始策略回测</button>
    <div id="backtest" style="margin-top:12px">等待回测</div>
</div>

<div class="card">
    <div style="font-weight:700;margin-bottom:10px">历史信号标记</div>
    <div id="historySignals">暂无数据</div>
</div>

</div>

<script>
const coins=[
"BTC-USDT-SWAP",
"ETH-USDT-SWAP",
"SOL-USDT-SWAP",
"XRP-USDT-SWAP",
"DOGE-USDT-SWAP",
"BNB-USDT-SWAP"
];

let current=coins[0];
let history=[];

function renderTabs(){
    let html="";
    coins.forEach(c=>{
        html+=`<div class="tab ${c===current?'active':''}" onclick="switchCoin('${c}')">${c.split('-')[0]}</div>`;
    });
    document.getElementById("tabs").innerHTML=html;
}

function switchCoin(c){
    current=c;
    history=[];
    document.getElementById("coinTitle").innerText=c;
    renderTabs();
    loadPrice();
}

async function loadPrice(){
    try{
        const res=await fetch(`https://www.okx.com/api/v5/market/ticker?instId=${current}`);
        const json=await res.json();

        const price=parseFloat(json.data[0].last);

        document.getElementById("price").innerText=price.toFixed(2);

        history.push(price);

        if(history.length>100){
            history.shift();
        }

        generateSignal(price);

    }catch(e){
        document.getElementById("price").innerText="刷新失败";
    }
}

function generateSignal(price){
    if(history.length<5){
        document.getElementById("score").innerText=50;
        return;
    }

    const support=Math.min(...history.slice(-10));
    let score=50;

    if(price>history[0]) score+=15;
    if(Math.abs(price-support)/price<0.003) score+=20;

    const recent=history.slice(-3);
    if(recent[2]>recent[1] && recent[1]<=recent[0]) score+=15;

    const trend=price>history[0]?"多头":"空头";
    const signal=score>=80?"强信号":score>=65?"观察":"等待";

    document.getElementById("trend").innerText=trend;
    document.getElementById("score").innerText=score;
    document.getElementById("signal").innerText=signal;
}

async function runBacktest(){
    const resultBox=document.getElementById("backtest");
    const historyBox=document.getElementById("historySignals");

    resultBox.innerHTML="回测中...";
    historyBox.innerHTML="加载中...";

    try{
        const url=`https://www.okx.com/api/v5/market/history-candles?instId=${current}&bar=5m&limit=100`;

        const res=await fetch(url);
        const json=await res.json();

        const candles=json.data.reverse().map(c=>({
            ts:Number(c[0]),
            open:parseFloat(c[1]),
            high:parseFloat(c[2]),
            low:parseFloat(c[3]),
            close:parseFloat(c[4]),
            vol:parseFloat(c[5])
        }));

        let trades=0,wins=0,pnlR=0,maxLossStreak=0,lossStreak=0;
        let signalLogs=[];

        for(let i=20;i<candles.length-5;i++){

            const recent=candles.slice(i-10,i);
            const support=Math.min(...recent.map(x=>x.low));

            const nearSupport=
                Math.abs(candles[i].close-support)/candles[i].close<0.003;

            const volDecline=
                candles[i].vol<candles[i-1].vol &&
                candles[i-1].vol<candles[i-2].vol;

            const rebound=
                candles[i+1].close>candles[i].close;

            if(!(nearSupport&&volDecline&&rebound)) continue;

            const entry=candles[i+1].close;
            const sl=support*0.998;
            const risk=entry-sl;
            const tp=entry+risk*2;

            trades++;

            let result="LOSS";
            let pnl=-1;

            for(let j=i+2;j<i+6;j++){
                if(candles[j].low<=sl){
                    result="LOSS";
                    pnl=-1;
                    break;
                }
                if(candles[j].high>=tp){
                    result="WIN";
                    pnl=2;
                    break;
                }
            }

            signalLogs.push({
                time:new Date(candles[i].ts).toLocaleString(),
                entry:entry.toFixed(2),
                result,
                pnl
            });

            if(result==="WIN"){
                wins++;
                pnlR+=2;
                lossStreak=0;
            }else{
                pnlR-=1;
                lossStreak++;
                maxLossStreak=Math.max(maxLossStreak,lossStreak);
            }
        }

        const capital=parseFloat(document.getElementById("capital").value)||1000;
        const lev=parseFloat(document.getElementById("lev").value)||5;

        const winRate=trades?((wins/trades)*100).toFixed(1):0;
        const finalCapital=(capital*(1+pnlR*0.01*lev)).toFixed(2);

        resultBox.innerHTML=
            `总交易：${trades}<br>
             胜率：${winRate}%<br>
             收益：${pnlR}R<br>
             最大连亏：${maxLossStreak}<br>
             模拟资金：${finalCapital} USDT`;

        historyBox.innerHTML=signalLogs.slice(-10).reverse().map(s=>`
            <div class="signal-item ${s.result==="WIN"?"win":"loss"}">
                ${s.time}<br>
                进场：${s.entry}<br>
                结果：${s.result}<br>
                收益：${s.pnl}R
            </div>
        `).join("");

    }catch(e){
        resultBox.innerHTML="回测失败";
        historyBox.innerHTML="加载失败";
    }
}

renderTabs();
loadPrice();
setInterval(loadPrice,5000);
</script>
</body>
</html>
