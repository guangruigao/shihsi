<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Multi-Timeframe Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: white; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ================= 你的原始策略逻辑 (完全保留，禁止修改) =================
        const calcEMA = (d, p) => { if(!d?.length) return 0; const k=2/(p+1); let e=d[0]; for(let i=1;i<d.length;i++) e=d[i]*k+e*(1-k); return e; };
        const calcRSI = (d, p=14) => { if(!d || d.length<p+1) return 50; let g=0, l=0; for(let i=1;i<=p;i++) { const df=d[i]-d[i-1]; if(df>=0) g+=df; else l-=df; } return 100-100/(1+g/(l||1)); };
        const calcVWAP = (c) => { const pv=c.reduce((s,x)=>s+x.close*x.volume,0); const v=c.reduce((s,x)=>s+x.volume,0); return v?pv/v:0; };
        const calcATR = (c, p=14) => { const ts=[]; for(let i=1;i<c.length;i++) ts.push(Math.max(c[i].high-c[i].low, Math.abs(c[i].high-c[i-1].close), Math.abs(c[i].low-c[i-1].close))); return ts.slice(-p).reduce((a,b)=>a+b,0)/p; };
        const calcFib = (c) => { const r=c.slice(-50); const h=Math.max(...r.map(x=>x.high)), l=Math.min(...r.map(x=>x.low)), rg=h-l; return {h, l, f618:h-rg*0.618, f500:h-rg*0.5}; };

        const scoreSystem = (candles) => {
          const closes = candles.map(c => c.close), volumes = candles.map(c => c.volume), last = closes.at(-1);
          const ema20 = calcEMA(closes.slice(-20), 20), ema50 = calcEMA(closes.slice(-50), 50);
          const slope = ema20 - calcEMA(closes.slice(-21,-1), 20);
          const rsi = calcRSI(closes.slice(-15)), vwap = calcVWAP(candles), atr = calcATR(candles);
          const pHigh = Math.max(...candles.slice(-20).map(c=>c.high)), pLow = Math.min(...candles.slice(-20).map(c=>c.low));

          const trend = (ema20 > ema50 ? 8 : 0) + (slope > 0 ? 6 : 0) + (last > vwap ? 6 : 0);
          const structure = (last > pHigh * 0.997 ? 10 : 0) + (last < pLow * 1.003 ? 10 : 0);
          const momentum = ((calcEMA(closes.slice(-12),12)-calcEMA(closes.slice(-26),26))>0 ? 10 : 0) + (rsi > 50 && rsi < 70 ? 5 : 0);
          const volScore = (volumes.at(-1) > (volumes.slice(-20).reduce((a,b)=>a+b,0)/20) ? 15 : 5);
          
          let total = trend + structure + momentum + volScore;
          
          // 信号定义
          let signal = total >= 85 ? "强做多" : total >= 70 ? "偏多" : total >= 55 ? "观望" : total <= 35 ? "做空" : "偏空";
          
          const isLong = total >= 50;
          const stopLoss = isLong ? pLow - atr * 0.5 : pHigh + atr * 0.5;
          const riskDist = Math.abs(last - stopLoss);
          const tp2 = isLong ? last + riskDist * 2 : last - riskDist * 2;
          if (riskDist && Math.abs(tp2 - last) / riskDist < 1.5) signal = "观望";

          return { total, signal, last };
        };

        function App() {
          const [btc, setBtc] = useState(null);
          const [eth, setEth] = useState(null);
          // 初始化本地存储记录
          const [tradeLog, setTradeLog] = useState(() => JSON.parse(localStorage.getItem('multi_tf_logs') || '[]'));

          useEffect(() => { localStorage.setItem('multi_tf_logs', JSON.stringify(tradeLog)); }, [tradeLog]);

          const fetchAllTimeframes = async (symbol) => {
            try {
              const fetchBar = async (bar) => {
                const r = await fetch(`https://www.okx.com/api/v5/market/candles?instId=${symbol}&bar=${bar}&limit=100`);
                const j = await r.json();
                return j.data.reverse().map(i => ({high:+i[2], low:+i[3], close:+i[4], volume:+i[5]}));
              };
              // 抓取三个级别：5m, 15m, 1H
              const [c5, c15, c1h] = await Promise.all([fetchBar("5m"), fetchBar("15m"), fetchBar("1H")]);
              const s5 = scoreSystem(c5), s15 = scoreSystem(c15), s1h = scoreSystem(c1h);
              return { price: s5.last, s5, s15, s1h };
            } catch(e) { return null; }
          };

          const checkTrigger = (name, data) => {
            const { s5, s15, s1h, price } = data;
            // 你的核心逻辑：5m分值达标 + 15m/1H共振
            const isLongEntry = s5.total >= 85 && s15.signal.includes("多") && s1h.signal.includes("多");
            const isShortEntry = s5.total <= 35 && s15.signal.includes("空") && s1h.signal.includes("空");

            if (isLongEntry || isShortEntry) {
              const last = tradeLog[0];
              // 防止重复记录（价格波动小于0.2%或15分钟内同向不重复触发）
              if (last && last.symbol === name && Math.abs(last.entry - price)/price < 0.002) return;

              setTradeLog(prev => [{
                id: Date.now(),
                time: new Date().toLocaleTimeString('zh-CN', {hour12:false}),
                symbol: name,
                side: isLongEntry ? "做多" : "做空",
                entry: price,
                score: s5.total.toFixed(0)
              }, ...prev].slice(0, 50));
            }
          };

          const update = async () => {
            const b = await fetchAllTimeframes("BTC-USDT-SWAP");
            const e = await fetchAllTimeframes("ETH-USDT-SWAP");
            if(b) { setBtc(b); checkTrigger("BTC", b); }
            if(e) { setEth(e); checkTrigger("ETH", e); }
          };

          useEffect(() => { update(); const t = setInterval(update, 20000); return () => clearInterval(t); }, [tradeLog]);

          const TFBadge = ({ label, s }) => (
            <div className="flex justify-between items-center bg-black/20 p-2 rounded-xl border border-white/5">
              <span className="text-[10px] text-slate-500 font-bold">{label}</span>
              <span className={`text-[10px] font-bold ${s?.signal.includes('多') ? 'text-emerald-400' : s?.signal.includes('空') ? 'text-red-400' : 'text-slate-400'}`}>
                {s ? s.signal : '--'}
              </span>
            </div>
          );

          return (
            <div className="max-w-md mx-auto p-4">
              <div className="flex justify-between items-center mb-6">
                <h1 className="text-xl font-black italic tracking-tighter">MULTI-TF RADAR</h1>
                <button onClick={() => setTradeLog([])} className="text-[10px] bg-slate-800 px-3 py-1 rounded-full text-slate-400">CLEAR</button>
              </div>

              <div className="space-y-4 mb-10">
                {[["BTC", btc], ["ETH", eth]].map(([name, data]) => (
                  <div key={name} className="bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl">
                    <div className="flex justify-between items-center mb-4">
                      <span className="text-lg font-black">{name}</span>
                      <span className="text-xl font-mono font-bold text-blue-400">{data?.price.toLocaleString()}</span>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      <TFBadge label="5M" s={data?.s5} />
                      <TFBadge label="15M" s={data?.s15} />
                      <TFBadge label="1H" s={data?.s1h} />
                    </div>
                    <div className="mt-4 pt-4 border-t border-white/5 flex justify-between items-center">
                      <span className="text-xs text-slate-500">主评分 (5M)</span>
                      <span className={`text-2xl font-black ${data?.s5.total >= 85 ? 'text-emerald-400' : data?.s5.total <= 35 ? 'text-red-400' : 'text-white'}`}>
                        {data ? data.s5.total.toFixed(0) : '--'}
                      </span>
                    </div>
                  </div>
                ))}
              </div>

              <div className="space-y-3">
                <h3 className="text-xs font-bold text-slate-500 ml-1 uppercase tracking-widest">共振信号历史</h3>
                {tradeLog.map(t => (
                  <div key={t.id} className="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl flex justify-between items-center">
                    <div>
                      <p className="font-black text-sm">{t.symbol} <span className={t.side === '做多' ? 'text-emerald-500' : 'text-red-400'}>{t.side}</span></p>
                      <p className="text-[10px] text-slate-500 font-medium">{t.time}</p>
                    </div>
                    <div className="text-right">
                      <p className="text-xs font-mono font-bold">{t.entry.toLocaleString()}</p>
                      <p className="text-[10px] text-blue-400 font-bold italic">5M: {t.score}分</p>
                    </div>
                  </div>
                ))}
                {tradeLog.length === 0 && <div className="text-center py-10 text-xs text-slate-700 font-bold uppercase tracking-widest">Waiting for Resonance...</div>}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
