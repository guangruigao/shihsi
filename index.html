<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>量化共振执行终端</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(51, 65, 85, 0.5); backdrop-filter: blur(12px); }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .value-mono { font-family: ui-monospace, monospace; }
        .resonance-active { border-color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.15); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ================= 核心算法库 (不省略) =================
        const calcEMA = (d, p) => { if (!d?.length) return 0; const k = 2/(p+1); let e = d[0]; for (let i=1; i<d.length; i++) e = d[i]*k + e*(1-k); return e; };
        const calcRSI = (d, p=14) => { if (!d || d.length < p+1) return 50; let g=0, l=0; for (let i=1; i<=p; i++) { const df=d[i]-d[i-1]; if(df>=0) g+=df; else l-=df; } return 100-100/(1+(g/(l||1))); };
        const calcATR = (c, p=14) => { const trs=[]; for(let i=1; i<c.length; i++) trs.push(Math.max(c[i].high-c[i].low, Math.abs(c[i].high-c[i-1].close), Math.abs(c[i].low-c[i-1].close))); return trs.slice(-p).reduce((a,b)=>a+b, 0)/p; };
        const calcFib = (c) => { const recent = c.slice(-50); const h = Math.max(...recent.map(x=>x.high)), l = Math.min(...recent.map(x=>x.low)), r = h-l; return { high:h, low:l, f618: h-r*0.618, f500: h-r*0.5, f382: h-r*0.382 }; };
        const calcADX = (c) => { const atr = calcATR(c); const range = Math.max(...c.slice(-14).map(x=>x.high)) - Math.min(...c.slice(-14).map(x=>x.low)); return atr ? Math.min(50, (range/atr)*5) : 20; };

        // ================= 评分与执行逻辑 =================
        const scoreSystem = (candles, fearGreed=32) => {
            const closes = candles.map(c => c.close), vols = candles.map(c => c.volume), last = closes.at(-1);
            const ema20 = calcEMA(closes.slice(-20), 20), ema50 = calcEMA(closes.slice(-50), 50), atr = calcATR(candles), rsi = calcRSI(closes.slice(-15));
            const fib = calcFib(candles), prevHigh = Math.max(...candles.slice(-20).map(c => c.high)), prevLow = Math.min(...candles.slice(-20).map(c => c.low));
            
            // 基础得分项
            const trendScore = (ema20 > ema50 ? 10 : 0) + (last > ema20 ? 10 : 0);
            const volAvg = vols.slice(-20).reduce((a,b)=>a+b,0)/20;
            const volumeScore = (vols.at(-1) > volAvg * 1.5 ? 15 : (vols.at(-1) > volAvg ? 8 : 0));
            
            // 流动性扫损检测
            let sweepType = "无"; let sweepScore = 0;
            if (candles.at(-1).high > prevHigh && last < prevHigh) { sweepType = "上扫 (空)"; sweepScore = -10; }
            if (candles.at(-1).low < prevLow && last > prevLow) { sweepType = "下扫 (多)"; sweepScore = 10; }

            // 计算止损和止盈 (基于 5m)
            const isLong = (trendScore + volumeScore) > 15;
            const stopLoss = isLong ? prevLow - atr * 0.5 : prevHigh + atr * 0.5;
            const riskDist = Math.abs(last - stopLoss);
            
            return {
                total: trendScore + volumeScore + sweepScore + (rsi > 50 ? 5 : 0),
                signal: isLong ? "做多" : "做空",
                last, atr, rsi, volumeScore, sweepType, fib, stopLoss,
                tp1: isLong ? last + riskDist : last - riskDist,
                tp2: isLong ? last + riskDist * 2 : last - riskDist * 2,
                tp3: isLong ? last + riskDist * 3 : last - riskDist * 3,
                rr: 2.0, adx: calcADX(candles)
            };
        };

        function App() {
            const [market, setMarket] = useState({ btc: null, eth: null });
            const [time, setTime] = useState(new Date());

            const fetchCoin = async (instId) => {
                try {
                    const getK = async (bar) => {
                        const res = await fetch(`https://www.okx.com/api/v5/market/candles?instId=${instId}&bar=${bar}&limit=100`);
                        const j = await res.json();
                        return j.data.reverse().map(i => ({ high:+i[2], low:+i[3], close:+i[4], volume:+i[5] }));
                    };
                    const [c5, c15, c1h] = await Promise.all([getK("5m"), getK("15m"), getK("1H")]);
                    const s5 = scoreSystem(c5);
                    const s15 = scoreSystem(c15);
                    const s1h = scoreSystem(c1h);

                    // 综合多周期分数
                    let finalScore = s5.total;
                    if (s1h.signal === "做多") finalScore += 25; else finalScore -= 25;
                    if (s15.signal === "做多") finalScore += 15;

                    // 市场建议逻辑
                    let advice = "观望";
                    if (finalScore >= 75) advice = "【强力买入】三周期共振向上，建议分批入场。";
                    else if (finalScore >= 55) advice = "【偏多】趋势尚可，注意回调支撑位。";
                    else if (finalScore <= 30) advice = "【偏空】大趋势走弱，不宜盲目抄底。";
                    else advice = "【震荡】方向不明，建议等待量能突破。";

                    return { price: s5.last, finalScore, advice, s5, s15, s1h };
                } catch (e) { return null; }
            };

            const load = async () => {
                const [b, e] = await Promise.all([fetchCoin("BTC-USDT-SWAP"), fetchCoin("ETH-USDT-SWAP")]);
                setMarket({ btc: b, eth: e });
            };

            useEffect(() => { load(); const t = setInterval(load, 10000); return () => clearInterval(t); }, []);

            const Card = ({ name, data }) => {
                if (!data) return <div className="p-10 text-center text-slate-500 animate-pulse">数据加载中...</div>;
                const { s5, finalScore, advice, price } = data;
                const isHighConfidence = finalScore > 50;

                return (
                    <div className={`glass-panel rounded-[2.5rem] p-6 mb-6 transition-all duration-500 ${isHighConfidence ? 'resonance-active' : ''}`}>
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h2 className="text-slate-400 font-bold text-xs tracking-tighter uppercase mb-1">{name} 永续合约</h2>
                                <div className="text-4xl font-black value-mono">${price.toLocaleString()}</div>
                            </div>
                            <div className="text-right">
                                <div className="text-3xl font-black text-emerald-400">{finalScore.toFixed(0)} <span className="text-xs font-normal opacity-40">分</span></div>
                                <div className="text-[10px] text-slate-500 mt-1 uppercase font-bold">RSI: {s5.rsi.toFixed(1)}</div>
                            </div>
                        </div>

                        {/* 三周期趋势状态 */}
                        <div className="grid grid-cols-3 gap-2 mb-6 text-center">
                            {[ {l:'1小时', d:data.s1h}, {l:'15分钟', d:data.s15}, {l:'5分钟', d:s5} ].map((x,i)=>(
                                <div key={i} className="bg-slate-900/50 rounded-2xl py-3 border border-slate-800">
                                    <div className="text-[9px] text-slate-500 mb-1 font-bold">{x.l}趋势</div>
                                    <div className={`text-xs font-black ${x.d.signal === '做多' ? 'text-emerald-400' : 'text-rose-400'}`}>{x.d.signal}</div>
                                </div>
                            ))}
                        </div>

                        {/* 指标详情细分 */}
                        <div className="grid grid-cols-2 gap-4 mb-6 px-2">
                            <div className="space-y-2">
                                <div className="flex justify-between text-xs"><span className="text-slate-500">扫损检测</span><span className="font-bold text-emerald-400">{s5.sweepType}</span></div>
                                <div className="flex justify-between text-xs"><span className="text-slate-500">量能评分</span><span className="font-bold">+{s5.volumeScore}</span></div>
                                <div className="flex justify-between text-xs"><span className="text-slate-500">ADX状态</span><span className="value-mono">{s5.adx.toFixed(1)}</span></div>
                            </div>
                            <div className="space-y-2">
                                <div className="flex justify-between text-xs"><span className="text-slate-500">Fib 618</span><span className="value-mono">{s5.fib.f618.toFixed(1)}</span></div>
                                <div className="flex justify-between text-xs"><span className="text-slate-500">前高参考</span><span className="value-mono">{s5.fib.high.toFixed(0)}</span></div>
                                <div className="flex justify-between text-xs"><span className="text-slate-500">盈亏比</span><span className="value-mono">1:2.0</span></div>
                            </div>
                        </div>

                        {/* 市场建议 */}
                        <div className="bg-emerald-500/5 border border-emerald-500/20 rounded-2xl p-4 mb-6">
                            <div className="text-[10px] text-emerald-500 font-bold mb-1 uppercase tracking-widest text-center">市场策略建议</div>
                            <div className="text-xs leading-relaxed text-slate-300 text-center font-medium">{advice}</div>
                        </div>

                        {/* 执行面板 */}
                        <div className="bg-slate-950/80 rounded-3xl p-5 border border-slate-800 shadow-inner">
                            <div className="flex justify-between items-center mb-4 pb-3 border-b border-slate-800/50">
                                <span className="text-rose-400 font-black text-sm tracking-tighter">止损价位 SL</span>
                                <span className="value-mono text-rose-400 text-lg font-bold">{s5.stopLoss.toFixed(1)}</span>
                            </div>
                            <div className="space-y-3">
                                <div className="flex justify-between text-[11px]"><span className="text-slate-500">保守止盈 TP1</span><span className="value-mono">{s5.tp1.toFixed(1)}</span></div>
                                <div className="flex justify-between text-sm"><span className="text-emerald-400 font-black">目标止盈 TP2</span><span className="value-mono text-emerald-400 font-bold">{s5.tp2.toFixed(1)}</span></div>
                                <div className="flex justify-between text-[11px]"><span className="text-slate-500">极限止盈 TP3</span><span className="value-mono">{s5.tp3.toFixed(1)}</span></div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto p-4 pb-12">
                    <header className="flex justify-between items-center py-8">
                        <div>
                            <h1 className="text-xs font-black tracking-[0.4em] text-slate-600 uppercase">Resonance Terminal</h1>
                            <p className="text-[10px] text-slate-500 font-mono mt-1 uppercase opacity-60">数据源：OKX 实时行情</p>
                        </div>
                        <div className="text-right">
                            <div className="flex items-center gap-2 justify-end">
                                <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                                <span className="text-[10px] font-mono text-emerald-500">LIVE</span>
                            </div>
                        </div>
                    </header>

                    <Card name="BTC" data={market.btc} />
                    <Card name="ETH" data={market.eth} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
