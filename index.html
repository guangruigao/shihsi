<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>量化交易实时监控 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card-bg { background-color: #0f172a; border: 1px solid #1e293b; }
        .data-label { color: #94a3b8; font-size: 0.75rem; }
        .data-value { font-family: ui-monospace, monospace; font-weight: 600; }
        .tp-color { color: #34d399; }
        .sl-color { color: #f87171; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ================= 核心计算逻辑 (完全同步你的最新版本) =================
        const calcEMA = (data, period) => {
            if (!data?.length) return 0;
            const k = 2 / (period + 1);
            let ema = data[0];
            for (let i = 1; i < data.length; i++) ema = data[i] * k + ema * (1 - k);
            return ema;
        };

        const calcRSI = (data, period = 14) => {
            if (!data || data.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                const diff = data[i] - data[i - 1];
                if (diff >= 0) gains += diff; else losses -= diff;
            }
            return 100 - 100 / (1 + (gains / (losses || 1)));
        };

        const calcVWAP = (candles) => {
            const pv = candles.reduce((s, c) => s + c.close * c.volume, 0);
            const v = candles.reduce((s, c) => s + c.volume, 0);
            return v ? pv / v : 0;
        };

        const calcATR = (candles, period = 14) => {
            const trs = [];
            for (let i = 1; i < candles.length; i++) {
                const h = candles[i].high, l = candles[i].low, pc = candles[i - 1].close;
                trs.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
            }
            return trs.slice(-period).reduce((a, b) => a + b, 0) / period;
        };

        const calcFib = (candles) => {
            const recent = candles.slice(-50);
            const high = Math.max(...recent.map(c => c.high));
            const low = Math.min(...recent.map(c => c.low));
            const range = high - low;
            return { high, low, fib382: high - range * 0.382, fib500: high - range * 0.5, fib618: high - range * 0.618 };
        };

        const scoreSystem = (candles, fearGreed = 50, news = []) => {
            const closes = candles.map(c => c.close);
            const volumes = candles.map(c => c.volume);
            const last = closes.at(-1);

            const ema20 = calcEMA(closes.slice(-20), 20);
            const ema50 = calcEMA(closes.slice(-50), 50);
            const ema20Prev = calcEMA(closes.slice(-21, -1), 20);
            const slope = ema20 - ema20Prev;

            const rsi = calcRSI(closes.slice(-15));
            const macd = calcEMA(closes.slice(-12), 12) - calcEMA(closes.slice(-26), 26);
            const avgVol = volumes.slice(-20).reduce((a, b) => a + b, 0) / 20;
            const vwap = calcVWAP(candles);
            const atr = calcATR(candles);
            const fib = calcFib(candles);

            const trend = (ema20 > ema50 ? 8 : 0) + (slope > 0 ? 6 : 0) + (last > vwap ? 6 : 0);
            const prevHigh = Math.max(...candles.slice(-20).map(c => c.high));
            const prevLow = Math.min(...candles.slice(-20).map(c => c.low));
            const structure = (last > prevHigh * 0.997 ? 10 : 0) + (last < prevLow * 1.003 ? 10 : 0);

            let fibScore = 0;
            const d618 = Math.abs(last - fib.fib618) / last;
            if (d618 < 0.003) fibScore = 8;

            const momentum = (macd > 0 ? 10 : 0) + (rsi > 50 && rsi < 70 ? 5 : 0);
            const volumeScore = (volumes.at(-1) > avgVol ? 15 : 5);
            const senti = fearGreed <= 40 ? 10 : 0;
            const newsS = news.length * 4;
            const risk = atr / last < 0.01 ? 5 : 0;

            const total = trend + structure + fibScore + momentum + volumeScore + senti + newsS + risk;
            const isLong = total >= 55;
            const signal = total >= 85 ? "强做多" : total >= 70 ? "偏多" : total >= 55 ? "观望" : "做空";

            const stopLoss = isLong ? prevLow - atr * 0.5 : prevHigh + atr * 0.5;
            const riskDistance = Math.abs(last - stopLoss);
            const tp1 = isLong ? last + riskDistance : last - riskDistance;
            const tp2 = isLong ? last + riskDistance * 2 : last - riskDistance * 2;
            const tp3 = isLong ? Math.max(prevHigh, fib.high) : Math.min(prevLow, fib.low);
            const rr = riskDistance ? Math.abs(tp2 - last) / riskDistance : 0;

            return { total, signal, trend, structure, fibScore, momentum, volumeScore, senti, newsS, risk, vwap, atr, fib, prevHigh, prevLow, stopLoss, tp1, tp2, tp3, rr };
        };

        function App() {
            const [market, setMarket] = useState({ btc: null, eth: null });
            const [time, setTime] = useState(new Date());

            const load = async () => {
                const fetchId = async (id) => {
                    const res = await fetch(`https://www.okx.com/api/v5/market/candles?instId=${id}&bar=5m&limit=100`);
                    const j = await res.json();
                    const c = j.data.reverse().map(i => ({ high: +i[2], low: +i[3], close: +i[4], volume: +i[5] }));
                    return { price: c.at(-1).close, score: scoreSystem(c, 32, ["ETF Inflow", "Rate Cut"]) };
                };
                const [b, e] = await Promise.all([fetchId("BTC-USDT-SWAP"), fetchId("ETH-USDT-SWAP")]);
                setMarket({ btc: b, eth: e });
            };

            useEffect(() => { load(); setInterval(load, 10000); setInterval(() => setTime(new Date()), 1000); }, []);

            const Card = ({ name, data }) => {
                if (!data) return null;
                const s = data.score;
                const isLong = s.total >= 55;
                const color = isLong ? "text-emerald-400" : "text-red-400";

                return (
                    <div className="card-bg rounded-3xl p-5 mb-6 shadow-2xl">
                        <div className="flex justify-between items-start mb-4">
                            <div>
                                <h2 className="text-xl font-bold text-slate-400 tracking-wider">{name}</h2>
                                <div className={`text-4xl font-black mt-1 ${color}`}>{s.total} <span className="text-lg">分</span></div>
                                <div className={`text-xl font-bold mt-1 ${color}`}>{s.signal}</div>
                            </div>
                            <div className="text-right">
                                <div className="text-slate-500 text-xs uppercase">Current Price</div>
                                <div className="text-2xl font-mono font-bold">${data.price.toLocaleString()}</div>
                            </div>
                        </div>

                        {/* 评分拆解 */}
                        <div className="grid grid-cols-3 gap-2 mb-4 text-[10px] uppercase tracking-tighter">
                            <div className="bg-slate-900 p-2 rounded-lg border border-slate-800">趋势: {s.trend}</div>
                            <div className="bg-slate-900 p-2 rounded-lg border border-slate-800">动能: {s.momentum}</div>
                            <div className="bg-slate-900 p-2 rounded-lg border border-slate-800">量能: {s.volumeScore}</div>
                        </div>

                        {/* 交易计划区 */}
                        <div className="bg-slate-950 rounded-2xl p-4 mb-4 border border-slate-800">
                            <div className="text-xs text-slate-500 font-bold mb-3 uppercase tracking-widest border-b border-slate-800 pb-1">Trading Plan</div>
                            <div className="space-y-2">
                                <div className="flex justify-between items-center text-sm">
                                    <span className="sl-color font-bold">止损 (SL)</span>
                                    <span className="font-mono sl-color">{s.stopLoss.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between items-center text-sm">
                                    <span className="tp-color font-bold text-xs">保守止盈 (TP1)</span>
                                    <span className="font-mono tp-color">{s.tp1.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between items-center text-sm">
                                    <span className="tp-color font-bold text-xs">标准止盈 (TP2)</span>
                                    <span className="font-mono tp-color">{s.tp2.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between items-center text-sm">
                                    <span className="tp-color font-bold text-xs">极限止盈 (TP3)</span>
                                    <span className="font-mono tp-color">{s.tp3.toFixed(2)}</span>
                                </div>
                                <div className="pt-2 border-t border-slate-800 flex justify-between text-[10px] text-slate-500">
                                    <span>盈亏比 (RR)</span>
                                    <span className="font-mono text-white">1 : {s.rr.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>

                        {/* 关键参考位 */}
                        <div className="grid grid-cols-2 gap-x-4 gap-y-1 text-[11px] text-slate-400">
                            <div className="flex justify-between border-b border-slate-800/50 py-1"><span>Fib 61.8</span> <span className="text-slate-200">{s.fib.fib618.toFixed(1)}</span></div>
                            <div className="flex justify-between border-b border-slate-800/50 py-1"><span>VWAP</span> <span className="text-slate-200">{s.vwap.toFixed(1)}</span></div>
                            <div className="flex justify-between border-b border-slate-800/50 py-1"><span>前高/低</span> <span className="text-slate-200">{s.prevHigh.toFixed(0)}/{s.prevLow.toFixed(0)}</span></div>
                            <div className="flex justify-between border-b border-slate-800/50 py-1"><span>ATR强度</span> <span className="text-slate-200">{s.atr.toFixed(2)}</span></div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto p-4 pb-12">
                    <div className="text-center py-6">
                        <div className="text-slate-500 text-[10px] tracking-[0.3em] uppercase">Quantitative Trading Terminal</div>
                        <div className="text-slate-300 font-mono text-xs mt-1">{time.toLocaleString()}</div>
                    </div>
                    <Card name="BTC-USDT-SWAP" data={market.btc} />
                    <Card name="ETH-USDT-SWAP" data={market.eth} />
                    <div className="mt-2 p-4 rounded-2xl bg-slate-900/50 text-[10px] text-slate-500 border border-slate-800 leading-relaxed text-center">
                        市场情绪: 32 (恐惧) | 关键消息: ETF 流入, 降息预期强劲
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
