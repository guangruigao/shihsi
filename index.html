<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>量化实时监控 - 增强实战版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #ffffff; font-family: -apple-system, system-ui, sans-serif; }
        .card-bg { background-color: #0f172a; border: 1px solid #1e293b; }
        .plan-box { background-color: #020617; border: 1px solid #334155; }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ================= 核心计算函数 =================
        const calcEMA = (data, p) => {
            if (!data?.length) return 0;
            const k = 2 / (p + 1);
            let ema = data[0];
            for (let i = 1; i < data.length; i++) ema = data[i] * k + ema * (1 - k);
            return ema;
        };

        const calcRSI = (data, p = 14) => {
            if (!data || data.length < p + 1) return 50;
            let g = 0, l = 0;
            for (let i = 1; i <= p; i++) {
                const diff = data[i] - data[i - 1];
                if (diff >= 0) g += diff; else l -= diff;
            }
            return 100 - 100 / (1 + (g / (l || 1)));
        };

        const calcVWAP = (c) => {
            const pv = c.reduce((s, x) => s + x.close * x.volume, 0);
            const v = c.reduce((s, x) => s + x.volume, 0);
            return v ? pv / v : 0;
        };

        const calcATR = (c, p = 14) => {
            const trs = [];
            for (let i = 1; i < c.length; i++) {
                trs.push(Math.max(c[i].high - c[i].low, Math.abs(c[i].high - c[i - 1].close), Math.abs(c[i].low - c[i - 1].close)));
            }
            return trs.slice(-p).reduce((a, b) => a + b, 0) / p;
        };

        const calcATRSeries = (c, p = 14) => {
            const out = [];
            for (let i = p; i < c.length; i++) out.push(calcATR(c.slice(0, i + 1), p));
            return out;
        };

        const calcADXMock = (c) => {
            const atr = calcATR(c);
            const range = Math.max(...c.slice(-14).map(x => x.high)) - Math.min(...c.slice(-14).map(x => x.low));
            return atr ? Math.min(50, (range / atr) * 5) : 20;
        };

        const calcFib = (c) => {
            const recent = c.slice(-50);
            const high = Math.max(...recent.map(x => x.high));
            const low = Math.min(...recent.map(x => x.low));
            const r = high - low;
            return { high, low, fib618: high - r * 0.618 };
        };

        // ================= 核心评分系统 (实战增强版) =================
        const scoreSystem = (candles, fearGreed = 50, news = []) => {
            const closes = candles.map(c => c.close);
            const vols = candles.map(c => c.volume);
            const last = closes.at(-1);

            const ema20 = calcEMA(closes.slice(-20), 20);
            const ema50 = calcEMA(closes.slice(-50), 50);
            const ema20Prev = calcEMA(closes.slice(-21, -1), 20);
            const slope = ema20 - ema20Prev;
            const rsi = calcRSI(closes.slice(-15));
            const macd = calcEMA(closes.slice(-12), 12) - calcEMA(closes.slice(-26), 26);
            const avgVol = vols.slice(-20).reduce((a, b) => a + b, 0) / 20;
            const vwap = calcVWAP(candles);
            const atr = calcATR(candles);
            const fib = calcFib(candles);
            const adx = calcADXMock(candles);

            // 波动率过滤
            const atrSeries = calcATRSeries(candles, 14);
            const atrAvg100 = atrSeries.slice(-100).reduce((a, b) => a + b, 0) / Math.max(1, atrSeries.slice(-100).length);
            const atrRelative = atrAvg100 ? atr / atrAvg100 : 1;

            // 基础分项
            const trend = (ema20 > ema50 ? 8 : 0) + (slope > 0 ? 6 : 0) + (last > vwap ? 6 : 0);
            const prevHigh = Math.max(...candles.slice(-20).map(c => c.high));
            const prevLow = Math.min(...candles.slice(-20).map(c => c.low));
            const structure = (last > prevHigh * 0.997 ? 10 : 0) + (last < prevLow * 1.003 ? 10 : 0);
            const fibScore = Math.abs(last - fib.fib618) / last < 0.003 ? 8 : 0;
            const momentum = (macd > 0 ? 10 : 0) + (rsi > 50 && rsi < 70 ? 5 : 0);
            const volS = (vols.at(-1) > avgVol ? 15 : 5);
            const senti = fearGreed <= 40 ? 10 : 0;
            const newsS = news.length * 5;

            // 风险评分 (波动率惩罚)
            let risk = atr / last < 0.01 ? 5 : 0;
            if (atrRelative < 0.8) risk -= 10; // 横盘惩罚

            // ADX 权重调整
            const trendW = adx > 25 ? 1.3 : 0.8;
            const strucW = adx < 20 ? 1.4 : 1.0;

            let total = trend * trendW + structure * strucW + fibScore + momentum + volS + senti + newsS + risk;
            if (atrRelative < 0.8) total -= 5;

            // 交易计划计算
            const isLong = total >= 55;
            const stopLoss = isLong ? prevLow - atr * 0.5 : prevHigh + atr * 0.5;
            const riskDist = Math.abs(last - stopLoss);
            const tp1 = isLong ? last + riskDist : last - riskDist;
            const tp2 = isLong ? last + riskDist * 2 : last - riskDist * 2;
            const tp3 = isLong ? Math.max(prevHigh, fib.high) : Math.min(prevLow, fib.low);
            const rr = riskDist ? Math.abs(tp2 - last) / riskDist : 0;

            // 信号最终判定 (含盈亏比过滤)
            let signal = total >= 85 ? "强做多" : total >= 70 ? "偏多" : total >= 55 ? "观望" : "做空";
            if (rr < 1.5 && (signal === "强做多" || signal === "偏多")) signal = "观望 (RR过低)";

            return { total: Math.round(total), signal, vwap, atr, atrRelative, adx, stopLoss, tp1, tp2, tp3, rr, risk, trend, structure, momentum };
        };

        function App() {
            const [market, setMarket] = useState({ btc: null, eth: null });
            const [time, setTime] = useState(new Date());

            const load = async () => {
                const fetchId = async (id) => {
                    const res = await fetch(`https://www.okx.com/api/v5/market/candles?instId=${id}&bar=5m&limit=100`);
                    const j = await res.json();
                    const c = j.data.reverse().map(i => ({ high: +i[2], low: +i[3], close: +i[4], volume: +i[5] }));
                    return { price: c.at(-1).close, score: scoreSystem(c, 32, ["ETF Inflow", "Rate Cut"]) };
                };
                const [b, e] = await Promise.all([fetchId("BTC-USDT-SWAP"), fetchId("ETH-USDT-SWAP")]);
                setMarket({ btc: b, eth: e });
            };

            useEffect(() => { load(); setInterval(load, 10000); setInterval(() => setTime(new Date()), 1000); }, []);

            const Card = ({ name, data }) => {
                if (!data) return null;
                const s = data.score;
                const sigColor = s.signal.includes("做多") ? "text-emerald-400" : (s.signal.includes("做空") ? "text-red-400" : "text-yellow-500");

                return (
                    <div className="card-bg rounded-3xl p-5 mb-6">
                        <div className="flex justify-between items-start mb-4">
                            <div>
                                <h2 className="text-xl font-bold text-slate-400">{name}</h2>
                                <div className={`text-4xl font-black ${sigColor}`}>{s.total} <span className="text-lg">分</span></div>
                                <div className={`text-xl font-bold ${sigColor}`}>{s.signal}</div>
                            </div>
                            <div className="text-right">
                                <div className="text-2xl font-mono font-bold">${data.price.toLocaleString()}</div>
                                <div className="flex gap-1 justify-end mt-2">
                                    <span className="status-tag bg-slate-800 text-slate-300">{s.adx > 25 ? '趋势市' : s.adx < 20 ? '震荡市' : '过渡'}</span>
                                    <span className="status-tag bg-slate-800 text-slate-300">ATR:{s.atrRelative.toFixed(1)}x</span>
                                </div>
                            </div>
                        </div>

                        <div className="plan-box rounded-2xl p-4 mb-4">
                            <div className="grid grid-cols-2 gap-y-2 text-sm">
                                <div className="text-red-400 font-bold">止损: {s.stopLoss.toFixed(1)}</div>
                                <div className="text-emerald-400 text-right">TP1: {s.tp1.toFixed(1)}</div>
                                <div className="text-slate-400">盈亏比: 1:{s.rr.toFixed(2)}</div>
                                <div className="text-emerald-400 text-right font-bold">TP2: {s.tp2.toFixed(1)}</div>
                            </div>
                            <div className="mt-2 text-[10px] text-slate-500 border-t border-slate-800 pt-2 flex justify-between">
                                <span>极限止盈 (TP3)</span> <span>{s.tp3.toFixed(1)}</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-3 gap-2 text-[10px] text-slate-500">
                            <div className="flex justify-between border-b border-slate-800 pb-1"><span>趋势分</span><span>{s.trend.toFixed(1)}</span></div>
                            <div className="flex justify-between border-b border-slate-800 pb-1"><span>结构分</span><span>{s.structure.toFixed(1)}</span></div>
                            <div className="flex justify-between border-b border-slate-800 pb-1"><span>风险项</span><span>{s.risk}</span></div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto p-4 pb-12">
                    <div className="text-center py-4">
                        <div className="text-slate-500 text-[10px] tracking-[0.3em] uppercase">Quant Real-time Terminal</div>
                        <div className="text-slate-300 font-mono text-xs mt-1">{time.toLocaleString()}</div>
                    </div>
                    <Card name="BTC-USDT" data={market.btc} />
                    <Card name="ETH-USDT" data={market.eth} />
                    <div className="bg-slate-900/50 p-3 rounded-xl text-[10px] text-slate-600 leading-tight">
                        注：当盈亏比(RR) < 1.5 时，即使得分较高也会强制建议“观望”。ATR 相对值 < 0.8 表示当前处于极度缩量状态。
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
