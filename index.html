<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OKX 5秒刷新信号系统</title>
<style>
body{
    margin:0;
    background:#0d1117;
    color:#fff;
    font-family:-apple-system;
    padding:12px;
}
.wrap{
    max-width:520px;
    margin:auto;
}
.card{
    background:#161b22;
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
}
.tabs{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}
.tab{
    padding:10px;
    background:#1f2937;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
}
.active{
    border:1px solid #fff;
}
.row{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}
.big{
    font-size:28px;
    font-weight:700;
}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
    <div class="tabs" id="tabs"></div>
</div>

<div class="card">
    <div id="coinTitle">BTC-USDT-SWAP</div>
    <div class="big" id="price">加载中...</div>
    <div class="row"><span>趋势</span><span id="trend">--</span></div>
    <div class="row"><span>评分</span><span id="score">--</span></div>
    <div class="row"><span>信号</span><span id="signal">等待</span></div>
</div>

<div class="card">
    <div class="row"><span>支撑</span><span id="support">--</span></div>
    <div class="row"><span>压力</span><span id="resistance">--</span></div>
    <div class="row"><span>建议进场</span><span id="entry">--</span></div>
    <div class="row"><span>止损</span><span id="sl">--</span></div>
    <div class="row"><span>TP1</span><span id="tp1">--</span></div>
    <div class="row"><span>TP2</span><span id="tp2">--</span></div>
</div>

</div>

<script>
const coins = [
    "BTC-USDT-SWAP",
    "ETH-USDT-SWAP",
    "SOL-USDT-SWAP",
    "XRP-USDT-SWAP",
    "DOGE-USDT-SWAP",
    "BNB-USDT-SWAP"
];

let current = coins[0];
let history = [];

function renderTabs(){
    let html = "";
    coins.forEach(c=>{
        html += `<div class="tab ${c===current?'active':''}" onclick="switchCoin('${c}')">${c.split('-')[0]}</div>`;
    });
    document.getElementById("tabs").innerHTML = html;
}

function switchCoin(c){
    current = c;
    history = [];
    document.getElementById("coinTitle").innerText = c;
    renderTabs();
    loadPrice();
}

async function loadPrice(){
    try{
        const url = `https://www.okx.com/api/v5/market/ticker?instId=${current}`;
        const res = await fetch(url);
        const json = await res.json();

        const price = parseFloat(json.data[0].last);

        document.getElementById("price").innerText = price.toFixed(2);

        history.push(price);

        if(history.length > 20){
            history.shift();
        }

        generateSignal(price);

    }catch(e){
        document.getElementById("price").innerText = "刷新失败";
    }
}

function generateSignal(price){
    if(history.length < 5) return;

    const support = Math.min(...history);
    const resistance = Math.max(...history);

    let score = 0;

    if(price > history[0]) score += 30;
    if(Math.abs(price-support)/price < 0.003) score += 30;
    if(history[4] > history[3]) score += 20;
    if(price > support) score += 20;

    const signal =
        score >= 80 ? "强信号" :
        score >= 65 ? "观察" :
        "等待";

    const trend = price > history[0] ? "多头" : "空头";

    document.getElementById("trend").innerText = trend;
    document.getElementById("score").innerText = score;
    document.getElementById("signal").innerText = signal;
    document.getElementById("support").innerText = support.toFixed(2);
    document.getElementById("resistance").innerText = resistance.toFixed(2);
    document.getElementById("entry").innerText = `${support.toFixed(2)} - ${price.toFixed(2)}`;
    document.getElementById("sl").innerText = (support * 0.998).toFixed(2);
    document.getElementById("tp1").innerText = resistance.toFixed(2);
    document.getElementById("tp2").innerText = (resistance * 1.003).toFixed(2);
}

renderTabs();
loadPrice();
setInterval(loadPrice, 5000);
</script>
</body>
</html>
