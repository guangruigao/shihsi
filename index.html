<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crypto Signal Pro</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#fff;padding:16px}
.card{background:#1e293b;border-radius:16px;padding:16px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.big{font-size:32px;font-weight:700}
.small{font-size:13px;color:#cbd5e1}
.trade{padding:10px;background:#334155;border-radius:12px;margin:8px 0}
</style>
</head>
<body>

<div class="card">
  <h1>BTC / ETH 实时信号系统</h1>
  <div id="time"></div>
</div>

<div class="card" id="btcCard"></div>
<div class="card" id="ethCard"></div>

<div class="card">
  <h2>交易记录 / 回测</h2>
  <div id="stats"></div>
  <div id="tradeLog"></div>
</div>

<script>
const WEBHOOK="替换你的飞书webhook";
let tradeLog=JSON.parse(localStorage.getItem("tradeLog")||"[]");

function save(){
  localStorage.setItem("tradeLog",JSON.stringify(tradeLog));
}

async function fetchCandles(instId,bar){
  const url=`https://www.okx.com/api/v5/market/candles?instId=${instId}&bar=${bar}&limit=100`;
  const res=await fetch(url);
  const json=await res.json();
  return json.data.map(k=>({
    ts:+k[0],
    open:+k[1],
    high:+k[2],
    low:+k[3],
    close:+k[4],
    vol:+k[5]
  })).reverse();
}

function ema(arr,p){
  const k=2/(p+1);
  let e=arr[0];
  return arr.map(v=>e=v*k+e*(1-k));
}

function rsi(arr,p=14){
  let gains=0,loss=0;
  for(let i=1;i<=p;i++){
    let d=arr[i]-arr[i-1];
    if(d>=0) gains+=d;
    else loss-=d;
  }
  let rs=gains/(loss||1);
  return 100-(100/(1+rs));
}

function score(c5,c15,c1h){
  const close5=c5.map(x=>x.close);
  const close15=c15.map(x=>x.close);
  const close1h=c1h.map(x=>x.close);

  const e20=ema(close5,20).at(-1);
  const e50=ema(close5,50).at(-1);
  const last=close5.at(-1);

  let s=50;

  if(last>e20) s+=10;
  if(e20>e50) s+=15;

  const r=rsi(close5);
  if(r<30) s+=10;
  if(r>70) s-=10;

  const t15=close15.at(-1)>ema(close15,20).at(-1);
  const t1h=close1h.at(-1)>ema(close1h,20).at(-1);

  if(t15) s+=10; else s-=10;
  if(t1h) s+=15; else s-=15;

  return Math.max(0,Math.min(100,s));
}

function signalText(s){
  if(s>=88) return "强做多";
  if(s>=75) return "做多";
  if(s<=40) return "强做空";
  if(s<=50) return "做空";
  return "观望";
}

function addTrade(symbol,price,side){
  const now=Date.now();

  const duplicated=tradeLog.some(t=>
    t.symbol===symbol &&
    t.side===side &&
    now-t.createdAt<30*60*1000
  );

  if(duplicated) return;

  const trade={
    id:now,
    symbol,
    side,
    entry:price,
    stopLoss:side.includes("多")?price*0.992:price*1.008,
    takeProfit:side.includes("多")?price*1.015:price*0.985,
    createdAt:now,
    margin:100,
    leverage:10,
    notional:1000,
    pnl:0,
    roi:0,
    status:"持仓中"
  };

  tradeLog.unshift(trade);
  tradeLog=tradeLog.slice(0,30);
  save();
  pushFeishu(trade);
}

async function pushFeishu(t){
  if(WEBHOOK.includes("替换")) return;

  await fetch(WEBHOOK,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      msg_type:"text",
      content:{
        text:`🚨 ${t.symbol} ${t.side}
入场:${t.entry.toFixed(2)}
止损:${t.stopLoss.toFixed(2)}
止盈:${t.takeProfit.toFixed(2)}`
      }
    })
  });
}

function updateTrades(prices){
  tradeLog=tradeLog.map(t=>{
    if(t.status!=="持仓中") return t;

    const px=prices[t.symbol];
    let exit=null;

    if(t.side.includes("多")){
      if(px<=t.stopLoss) exit=t.stopLoss;
      if(px>=t.takeProfit) exit=t.takeProfit;
    }else{
      if(px>=t.stopLoss) exit=t.stopLoss;
      if(px<=t.takeProfit) exit=t.takeProfit;
    }

    const pnl=((t.side.includes("多")
      ?(exit||px)-t.entry
      :t.entry-(exit||px))/t.entry)*t.notional;

    return {
      ...t,
      pnl,
      roi:pnl/t.margin*100,
      status:exit?(pnl>=0?"止盈":"止损"):"持仓中"
    };
  });

  save();
}

function renderCard(id,name,price,scoreVal){
  document.getElementById(id).innerHTML=`
    <div class="grid">
      <div>
        <div class="small">${name}价格</div>
        <div class="big">${price.toFixed(2)}</div>
      </div>
      <div>
        <div class="small">评分</div>
        <div class="big">${scoreVal}</div>
      </div>
    </div>
    <div style="margin-top:12px">${signalText(scoreVal)}</div>
  `;
}

function renderTrades(){
  const win=tradeLog.filter(x=>x.status==="止盈").length;
  const totalPnl=tradeLog.reduce((a,b)=>a+b.pnl,0);

  document.getElementById("stats").innerHTML=
    `总交易:${tradeLog.length} | 胜率:${tradeLog.length?((win/tradeLog.length)*100).toFixed(1):0}% | 累计:${totalPnl.toFixed(2)}U`;

  document.getElementById("tradeLog").innerHTML=
    tradeLog.map(t=>`
      <div class="trade">
        ${t.symbol} ${t.side} | ${t.status}
        | ${t.pnl.toFixed(2)}U
        | ${t.roi.toFixed(1)}%
      </div>
    `).join("");
}

async function load(){
  document.getElementById("time").innerText=new Date().toLocaleString();

  const [b5,b15,b1,bE5,bE15,bE1]=await Promise.all([
    fetchCandles("BTC-USDT-SWAP","5m"),
    fetchCandles("BTC-USDT-SWAP","15m"),
    fetchCandles("BTC-USDT-SWAP","1H"),
    fetchCandles("ETH-USDT-SWAP","5m"),
    fetchCandles("ETH-USDT-SWAP","15m"),
    fetchCandles("ETH-USDT-SWAP","1H")
  ]);

  const btcScore=score(b5,b15,b1);
  const ethScore=score(bE5,bE15,bE1);

  const btcPrice=b5.at(-1).close;
  const ethPrice=bE5.at(-1).close;

  renderCard("btcCard","BTC",btcPrice,btcScore);
  renderCard("ethCard","ETH",ethPrice,ethScore);

  if(btcScore>=88) addTrade("BTC",btcPrice,"强做多");
  if(btcScore<=40) addTrade("BTC",btcPrice,"强做空");

  if(ethScore>=88) addTrade("ETH",ethPrice,"强做多");
  if(ethScore<=40) addTrade("ETH",ethPrice,"强做空");

  updateTrades({BTC:btcPrice,ETH:ethPrice});
  renderTrades();
}

setInterval(load,10000);
load();
</script>
</body>
</html>
