<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>量化监控终端</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #ffffff; margin: 0; }
        .card-bg { background-color: #0f172a; border: 1px solid #1e293b; }
        .resonance-glow { border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 核心计算函数 ---
        const calcEMA = (d, p) => { if (!d?.length) return 0; const k = 2/(p+1); let e = d[0]; for (let i=1; i<d.length; i++) e = d[i]*k + e*(1-k); return e; };
        const calcRSI = (d, p=14) => { if (!d || d.length < p+1) return 50; let g=0, l=0; for (let i=1; i<=p; i++) { const df=d[i]-d[i-1]; if(df>=0) g+=df; else l-=df; } return 100-100/(1+(g/(l||1))); };
        const calcATR = (c, p=14) => { const trs=[]; for(let i=1; i<c.length; i++) trs.push(Math.max(c[i].high-c[i].low, Math.abs(c[i].high-c[i-1].close), Math.abs(c[i].low-c[i-1].close))); return trs.slice(-p).reduce((a,b)=>a+b,0)/p; };
        
        const scoreSystem = (candles) => {
            const closes = candles.map(c => c.close);
            const last = closes.at(-1);
            const atr = calcATR(candles);
            const ema20 = calcEMA(closes.slice(-20), 20);
            const ema50 = calcEMA(closes.slice(-50), 50);
            const rsi = calcRSI(closes.slice(-15));
            const prevHigh = Math.max(...candles.slice(-20).map(c => c.high));
            const prevLow = Math.min(...candles.slice(-20).map(c => c.low));

            const isLong = ema20 > ema50;
            const stopLoss = isLong ? prevLow - atr * 0.5 : prevHigh + atr * 0.5;
            const riskDist = Math.abs(last - stopLoss);
            
            return {
                total: (isLong ? 20 : 0) + (rsi > 50 ? 15 : 0),
                signal: isLong ? "做多" : "做空",
                last, stopLoss,
                tp1: isLong ? last + riskDist : last - riskDist,
                tp2: isLong ? last + riskDist * 2 : last - riskDist * 2,
                tp3: isLong ? last + riskDist * 3 : last - riskDist * 3,
                rr: 2.0
            };
        };

        function App() {
            const [market, setMarket] = useState({ btc: null, eth: null });

            const fetchCoin = async (instId) => {
                try {
                    const getK = async (bar) => {
                        const res = await fetch(`https://www.okx.com/api/v5/market/candles?instId=${instId}&bar=${bar}&limit=100`);
                        const j = await res.json();
                        return j.data.map(i => ({ high:+i[2], low:+i[3], close:+i[4], volume:+i[5] })).reverse();
                    };
                    const [c5, c15, c1h] = await Promise.all([getK("5m"), getK("15m"), getK("1H")]);
                    const s5 = scoreSystem(c5);
                    const s15 = scoreSystem(c15);
                    const s1h = scoreSystem(c1h);

                    let finalScore = s5.total + (s1h.signal === "做多" ? 20 : -20);
                    return { price: s5.last, score: { ...s5, total: finalScore, s15, s1h } };
                } catch (e) { console.error(e); return null; }
            };

            const load = async () => {
                const b = await fetchCoin("BTC-USDT-SWAP");
                const e = await fetchCoin("ETH-USDT-SWAP");
                setMarket({ btc: b, eth: e });
            };

            useEffect(() => { load(); const t = setInterval(load, 10000); return () => clearInterval(t); }, []);

            const Card = ({ name, data }) => {
                if (!data) return <div className="p-10 text-center opacity-50">加载 {name} 数据中...</div>;
                const { score: s, price } = data;
                return (
                    <div className={`card-bg rounded-3xl p-5 mb-4 ${s.s1h.signal === "做多" && s.signal === "做多" ? 'resonance-glow' : ''}`}>
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="font-bold text-slate-400">{name}</h2>
                            <div className="text-xl font-mono">${price.toLocaleString()}</div>
                        </div>
                        <div className="text-4xl font-black text-emerald-400 mb-4">{s.total} <span className="text-sm font-normal text-slate-500">SCORE</span></div>
                        
                        <div className="bg-slate-950 p-4 rounded-2xl space-y-3 border border-slate-800">
                            <div className="flex justify-between text-xs"><span className="text-red-400">止损 SL</span><span className="font-mono">{s.stopLoss.toFixed(1)}</span></div>
                            <div className="flex justify-between text-xs text-slate-400"><span>止盈 TP1</span><span className="font-mono">{s.tp1.toFixed(1)}</span></div>
                            <div className="flex justify-between text-sm font-bold text-emerald-400"><span>标准 TP2</span><span className="font-mono">{s.tp2.toFixed(1)}</span></div>
                            <div className="flex justify-between text-xs text-slate-400"><span>极限 TP3</span><span className="font-mono">{s.tp3.toFixed(1)}</span></div>
                        </div>

                        <div className="grid grid-cols-2 gap-2 mt-4">
                            <div className="bg-slate-900 p-2 rounded-lg text-center text-[10px]">15M: {s.s15.signal}</div>
                            <div className="bg-slate-900 p-2 rounded-lg text-center text-[10px]">1H: {s.s1h.signal}</div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto p-4">
                    <h1 className="text-center py-6 text-slate-500 text-xs tracking-widest uppercase font-bold">Resonance Terminal</h1>
                    <Card name="BTC-USDT" data={market.btc} />
                    <Card name="ETH-USDT" data={market.eth} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
